version: 3.0.0
homepage: https://github.com/bulltechnologies/bip32
repository: https://github.com/bulltechnologies/bip32
issue_tracker: https://github.com/bulltechnologies/bip32/issues

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  pointycastle: ^4.0.0
  hex: ^0.2.0
  bs58check: ^1.0.2

dev_dependencies:
  test: ^1.25.0
  lints: ^6.1.0
